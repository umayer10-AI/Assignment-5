<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-base-300">
    <header>
        <div class="navbar bg-base-100 shadow-sm px-10 grid grid-cols-1 gap-3 lg:gap-0 lg:flex">
        <div class="flex justify-center lg:flex-1 lg:justify-start">
            <a class="btn btn-ghost text-xl"><i class="fa-brands fa-github text-3xl"></i>GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-3">
            <label class="input input-bordered flex items-center gap-2 input-btn">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" class="grow" placeholder="Search issues..." />
            </label>
            <button class="btn btn-primary inputValueBtn"><i class="fa-solid fa-plus"></i> New Issue</button>
        </div>
        </div>
    </header>

    <section class="max-w-[80%] mx-auto bg-[#ffffff] rounded-xl mt-5 btn-container">
        <div class="p-3 space-x-1">
            <button id="all-btn" class="btn btn-primary">All</button>
            <button id="open" class="btn">Open</button>
            <button id="close" class="btn">Closed</button>
        </div>
    </section>

    <section>
        <div class="max-w-[80%] mx-auto bg-[#ffffff] rounded-xl mt-5 btn-container flex flex-col gap-4 lg:gap-0 lg:flex-row justify-between p-3">
            <div class="flex justify-center items-center gap-2">
                <img src="assets/Aperture.png" alt="">
                <div>
                    <h3 class="font-bold text-lg"><span class="total">50</span> Issues</h3>
                    <p class="text-[14px] text-neutral/50">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex justify-center items-center gap-3">
                <p><i class="fa-solid fa-circle text-green-600"></i> Open</p>
                <p><i class="fa-solid fa-circle text-purple-600"></i> Closed</p>
            </div>
        </div>
    </section>

    <section class="max-w-[80%] mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 card p-4 bg-base-700 shadow-md border border-gray-300 items-stretch">
            <div class="flex justify-center items-center col-span-full my-20">
                <span class="loading loading-spinner loading-xl"></span>
            </div>
        </div>
    </section>

    <section>
        <dialog id="my_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            
            <div class="modal-action">
            <form method="dialog">
                <button class="btn btn-primary">Close</button>
            </form>
            </div>
        </div>
        </dialog>
    </section>

    <script src="script2.js"></script>
</body>
</html>
